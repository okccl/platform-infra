apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: dev
servers: 1
agents: 3
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
      # Cilium に CNI を委ねるため flannel を無効化
      - arg: --flannel-backend=none
        nodeFilters:
          - server:*
      # Cilium が Network Policy を管理するため k3s 組み込みを無効化
      - arg: --disable-network-policy
        nodeFilters:
          - server:*
      # kube-proxy は k3s に任せる（ローカル環境での安定性優先）
